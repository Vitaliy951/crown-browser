<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AI-Native Edge Browser MVP</title>
    <style>
        :root {
            --bg-main: #1e1e24;
            --bg-sidebar: #111115;
            --bg-chat: #18181c;
            --accent: #0078d4;
            --accent-hover: #106ebe;
            --text-main: #f5f5f7;
            --text-muted: #a1a1aa;
            --border: #2d2d34;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-main);
            color: var(--text-main);
        }

        /* Верхняя панель навигации */
        #toolbar {
            background: var(--bg-main);
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .nav-btn {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 6px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .nav-btn:hover {
            background: var(--border);
            border-color: var(--text-muted);
        }

        #address-bar {
            flex: 1;
            padding: 6px 12px;
            background: var(--bg-chat);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        #address-bar:focus {
            border-color: var(--accent);
        }

        .go-btn {
            padding: 6px 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .go-btn:hover {
            background: var(--accent-hover);
        }

        /* Основная рабочая область */
        #main-area {
            display: flex;
            flex: 1;
            width: 100%;
            height: calc(100% - 57px);
        }

        #web-view {
            flex: 3;
            height: 100%;
            border: none;
            background: #ffffff;
        }

        /* Боковая панель в стиле Edge Copilot */
        #sidebar {
            flex: 1;
            min-width: 340px;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            background: var(--bg-sidebar);
            border-left: 1px solid var(--border);
            box-shadow: -4px 0 16px rgba(0,0,0,0.3);
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .copilot-icon {
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #0078d4, #50e6ff);
            border-radius: 4px;
        }

        /* Область сообщений чата */
        #chat-output {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--bg-sidebar);
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.system {
            background: var(--bg-chat);
            color: var(--text-main);
            border: 1px solid var(--border);
            align-self: flex-start;
            border-top-left-radius: 2px;
        }

        .message.user {
            background: var(--accent);
            color: white;
            align-self: flex-end;
            border-top-right-radius: 2px;
        }

        /* Индикатор загрузки ИИ */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: var(--bg-chat);
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            margin-right: 4px;
            animation: wave 1.3s linear infinite;
        }
        .dot:nth-child(2) { animation-delay: -1.1s; }
        .dot:nth-child(3) { animation-delay: -0.9s; }

        @keyframes wave {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }

        /* Контейнер ввода текста */
        .input-container {
            padding: 16px;
            background: var(--bg-sidebar);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            background: var(--bg-chat);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
        }

        #user-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            box-sizing: border-box;
        }

        .input-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-hint {
            font-size: 11px;
            color: var(--text-muted);
        }

        .send-btn {
            background: var(--accent);
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: var(--accent-hover);
        }
    </style>
</head>
<body>

    <!-- Навигационная панель браузера -->
    <div id="toolbar">
        <button class="nav-btn" onclick="document.getElementById('web-view').contentWindow.history.back()">◀</button>
        <button class="nav-btn" onclick="document.getElementById('web-view').contentWindow.history.forward()">▶</button>
        <input type="text" id="address-bar" value="https://mincifry.gov.ru" placeholder="Введите URL адрес..." />
        <button class="go-btn" onclick="navigate()">Перейти</button>
    </div>

    <!-- Основная рабочая область -->
    <div id="main-area">
        <!-- По умолчанию загружаем пустую страницу во избежание сетевых падений на Linux -->
        <iframe id="web-view" src="about:blank"></iframe>

        <!-- Боковая ИИ-панель в стиле Copilot -->
        <div id="sidebar">
            <div class="sidebar-header">
                <div class="copilot-icon"></div>
                <h3>Автономный ИИ-Ассистент</h3>
            </div>
            
            <div id="chat-output">
                <div class="message system">Привет! Я твой суверенный ИИ-помощник, работающий локально. Задай мне любой вопрос (например: «Где найти лучший хостинг?»).</div>
                
                <!-- Анимированные точки загрузки -->
                <div class="typing-indicator" id="loading">
                    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <textarea id="user-input" rows="2" placeholder="Спросите ИИ о чем угодно... (Enter для отправки)"></textarea>
                    <div class="input-footer">
                        <span class="input-hint">Данные не покидают ваш ПК</span>
                        <button class="send-btn" onclick="sendToAI()">▲</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        // Функция перехода по URL из адресной строки
        function navigate() {
            let url = document.getElementById('address-bar').value.trim();
            if (!url) return;

            if (!/^https?:\/\//i.test(url)) {
                url = 'https://' + url;
                document.getElementById('address-bar').value = url;
            }
            document.getElementById('web-view').src = url;
        }
