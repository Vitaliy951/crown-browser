<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AI-Native Edge Browser MVP</title>
    <style>
        :root {
            --bg-main: #1e1e24;
            --bg-sidebar: #111115;
            --bg-chat: #18181c;
            --accent: #0078d4;
            --accent-hover: #106ebe;
            --text-main: #f5f5f7;
            --text-muted: #a1a1aa;
            --border: #2d2d34;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-main);
            color: var(--text-main);
        }

        /* Навигационная панель */
        #toolbar {
            background: var(--bg-main);
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .nav-btn {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 6px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .nav-btn:hover { background: var(--border); border-color: var(--text-muted); }

        #address-bar {
            flex: 1;
            padding: 6px 12px;
            background: var(--bg-chat);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
        }

        #address-bar:focus { border-color: var(--accent); }

        .go-btn {
            padding: 6px 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .go-btn:hover { background: var(--accent-hover); }

        /* Рабочая область */
        #main-area {
            display: flex;
            flex: 1;
            width: 100%;
            height: calc(100% - 57px);
        }

        /* Нативный изолированный тег Electron вместо iframe */
        #web-view {
            flex: 3;
            height: 100%;
            border: none;
            background: #ffffff;
        }

        /* Панель ИИ */
        #sidebar {
            flex: 1;
            min-width: 340px;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            background: var(--bg-sidebar);
            border-left: 1px solid var(--border);
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .copilot-icon {
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #0078d4, #50e6ff);
            border-radius: 4px;
        }

        #chat-output {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.system { background: var(--bg-chat); color: var(--text-main); border: 1px solid var(--border); align-self: flex-start; }
        .message.user { background: var(--accent); color: white; align-self: flex-end; }

        .typing-indicator { display: none; align-self: flex-start; background: var(--bg-chat); padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); }
        .dot { display: inline-block; width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; margin-right: 4px; animation: wave 1.3s linear infinite; }
        @keyframes wave { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }

        .input-container { padding: 16px; border-top: 1px solid var(--border); }
        .input-wrapper { background: var(--bg-chat); border: 1px solid var(--border); border-radius: 8px; padding: 8px; display: flex; flex-direction: column; gap: 8px; }
        #user-input { width: 100%; background: transparent; border: none; color: var(--text-main); font-size: 14px; resize: none; outline: none; }
        .input-footer { display: flex; justify-content: space-between; align-items: center; }
        .input-hint { font-size: 11px; color: var(--text-muted); }
        .send-btn { background: var(--accent); border: none; color: white; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <div id="toolbar">
        <button class="nav-btn" onclick="document.getElementById('web-view').goBack()">◀</button>
        <button class="nav-btn" onclick="document.getElementById('web-view').goForward()">▶</button>
        <input type="text" id="address-bar" value="https://mincifry.gov.ru" />
        <button class="go-btn" onclick="navigate()">Перейти</button>
    </div>

    <div id="main-area">
        <!-- Нативный тег webview обеспечивает полную изоляцию и стабильность клавиатуры -->
        <webview id="web-view" src="about:blank"></webview>

        <div id="sidebar">
            <div class="sidebar-header">
                <div class="copilot-icon"></div>
                <h3>Автономный ИИ-Ассистент</h3>
            </div>
            
            <div id="chat-output">
                <div class="message system">Привет! Я твой суверенный ИИ-помощник. Введите запрос и нажмите Enter.</div>
                <div class="typing-indicator" id="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <textarea id="user-input" rows="2" placeholder="Спросите ИИ..."></textarea>
                    <div class="input-footer">
                        <span class="input-hint">Локальные вычисления</span>
                        <button class="send-btn" onclick="sendToAI()">▲</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        // Гарантируем принудительный возврат фокуса в поле ввода ИИ при старте
        window.onload = () => {
            setTimeout(() => { document.getElementById('user-input').focus(); }, 500);
        };

        function navigate() {
            let url = document.getElementById('address-bar').value.trim();
            if (!url) return;
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
            document.getElementById('web-view').src = url;
        }

        // Железобетонный перехват Enter для адресной строки
        document.getElementById('address-bar').ononkeydown = document.getElementById('address-bar').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                navigate();
            }
        });

        // Железобетонный перехват Enter для ИИ-ввода
        document.getElementById('user-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); // Запрещаем перенос строки
                sendToAI();
            }
        });

        async function sendToAI() {
            const inputField = document.getElementById('user-input');
            const outputField = document.getElementById('chat-output');
            const loadingIndicator = document.getElementById('loading');
            const prompt = inputField.value.trim();
            
            if (!prompt) return;

            inputField.value = '';

            const userDiv = document.createElement('div');
            userDiv.className = 'message user';
            userDiv.innerText = prompt;
            outputField.insertBefore(userDiv, loadingIndicator);

            loadingIndicator.style.display = 'block';
            outputField.scrollTop = outputField.scrollHeight;

            const response = await ipcRenderer.invoke('ask-ai', prompt);
            
            loadingIndicator.style.display = 'none';

            const aiDiv = document.createElement('div');
            aiDiv.className = 'message system';
            aiDiv.innerText = response;
            outputField.insertBefore(aiDiv, loadingIndicator);
            
            outputField.scrollTop = outputField.scrollHeight;
            inputField.focus(); // Возвращаем фокус ввода в чат
        }
    </script>
</body>
</html>
