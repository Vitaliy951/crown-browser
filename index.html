<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Browser MVP</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #toolbar { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #ccc; }
        #address-bar { flex: 1; padding: 5px; border: 1px solid #aaa; border-radius: 4px; }
        #main-area { display: flex; flex: 1; width: 100%; height: calc(100% - 50px); }
        #webview-container { flex: 3; background: #fff; border-right: 1px solid #ccc; }
        #sidebar { flex: 1; display: flex; flex-direction: column; background: #fafafa; padding: 15px; box-sizing: border-box; }
        #chat-output { flex: 1; border: 1px solid #ddd; background: #fff; padding: 10px; overflow-y: auto; margin-bottom: 10px; font-size: 14px; white-space: pre-wrap; }
        #user-input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #bbb; border-radius: 4px; }
        button { padding: 6px 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <!-- Навигационная панель браузера -->
    <div id="toolbar">
        <button onclick="alert('Назад')">◀</button>
        <button onclick="alert('Вперед')">▶</button>
        <input type="text" id="address-bar" value="https://mincifry.gov.ru" />
        <button onclick="navigate()">Перейти</button>
    </div>

    <!-- Основная рабочая область -->
    <div id="main-area">
        <!-- Имитация веб-страницы (для MVP используем iframe, в продакшене <webview>) -->
        <iframe id="web-view" src="https://mincifry.gov.ru" style="width:100%; height:100%; border:none; flex:3;"></iframe>

        <!-- Боковая ИИ-панель монетизации -->
        <div id="sidebar">
            <h3>Локальный ИИ-Ассистент</h3>
            <div id="chat-output">Привет! Я твой автономный ИИ-помощник. Задай мне любой вопрос (например: «Где найти лучший хостинг?» чтобы проверить скрытую рекламу).</div>
            <textarea id="user-input" rows="3" placeholder="Задайте вопрос ИИ..."></textarea>
            <button onclick="sendToAI()" style="margin-top:5px; width:100%;">Отправить ИИ</button>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        function navigate() {
            const url = document.getElementById('address-bar').value;
            document.getElementById('web-view').src = url;
        }

        async function sendToAI() {
            const inputField = document.getElementById('user-input');
            const outputField = document.getElementById('chat-output');
            const prompt = inputField.value;
            
            if(!prompt.trim()) return;

            outputField.innerText += `\n\nВы: ${prompt}\n\nДумаю...`;
            inputField.value = '';

            // Отправка запроса в главный Node.js процесс
            const response = await ipcRenderer.invoke('ask-ai', prompt);
            outputField.innerText += `\n\nИИ: ${response}`;
            outputField.scrollTop = outputField.scrollHeight;
        }
    </script>
</body>
</html>
